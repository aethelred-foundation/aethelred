# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "aethelred/core-team"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(go):"
    open-pull-requests-limit: 5

  # Rust crates — core cryptography
  - package-ecosystem: "cargo"
    directory: "/crates/core"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "aethelred/core-team"
    labels:
      - "dependencies"
      - "rust"
      - "security"
    commit-message:
      prefix: "deps(rust-core):"
    open-pull-requests-limit: 5

  # Rust crates — consensus
  - package-ecosystem: "cargo"
    directory: "/crates/consensus"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust-consensus):"

  # Rust SDK
  - package-ecosystem: "cargo"
    directory: "/sdk/aethelred-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "rust"
      - "sdk"
    commit-message:
      prefix: "deps(sdk-rust):"

  # Solidity contracts (npm)
  - package-ecosystem: "npm"
    directory: "/contracts/ethereum"
    schedule:
      interval: "weekly"
      day: "tuesday"
    reviewers:
      - "aethelred/contracts-team"
    labels:
      - "dependencies"
      - "solidity"
      - "security"
    commit-message:
      prefix: "deps(contracts):"
    open-pull-requests-limit: 5

  # VSCode extension
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "vscode"
    commit-message:
      prefix: "deps(vscode):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
    open-pull-requests-limit: 3
