# Aethelred Foundation — Org-Wide Label Standard
# Source of truth. Synced to all repos via .github/workflows/sync-labels.yml

# ── Priority ──────────────────────────────────
- name: p0
  color: "B60205"
  description: "Critical priority — drop everything"
- name: p1
  color: "D93F0B"
  description: "High priority"
- name: p2
  color: "FBCA04"
  description: "Medium priority"
- name: p3
  color: "0E8A16"
  description: "Low priority"

# ── Workflow ──────────────────────────────────
- name: blocked
  color: "000000"
  description: "Blocked by dependency or decision"
- name: needs-triage
  color: "D876E3"
  description: "Needs triage and prioritization"
- name: release
  color: "1D76DB"
  description: "Release preparation or release issue"
- name: mainnet
  color: "0052CC"
  description: "Mainnet-related work"
- name: testnet
  color: "0366D6"
  description: "Testnet-related work"
- name: good first issue
  color: "7057FF"
  description: "Good entry point for new contributors"
- name: help wanted
  color: "008672"
  description: "Extra attention is needed"

# ── Type ──────────────────────────────────────
- name: bug
  color: "D73A4A"
  description: "Something is broken"
- name: enhancement
  color: "A2EEEF"
  description: "New feature or enhancement"
- name: task
  color: "EDEDED"
  description: "General tracked task"
- name: refactor
  color: "C2E0C6"
  description: "Internal restructuring without behavior change"
- name: docs
  color: "0075CA"
  description: "Documentation work"
- name: security
  color: "5319E7"
  description: "Security-sensitive work"
- name: question
  color: "D876E3"
  description: "Further information is requested"

