name: Audit Config Guards

on:
  pull_request:
    paths:
      - "integrations/docker/**"
      - "tools/devnet/**"
      - "scripts/validate-compose-security.sh"
      - "scripts/validate-devnet-genesis.py"
      - "scripts/validate-pouw-medium-guards.sh"
      - "scripts/validate-low-findings-guards.sh"
      - "x/pouw/keeper/staking.go"
      - "x/pouw/keeper/consensus_testing_override_nonprod.go"
      - "crates/core/src/pillars/quadratic_burn.rs"
      - "crates/core/src/pillars/vector_vault.rs"
      - "contracts/contracts/AethelredBridge.sol"
      - "contracts/contracts/InstitutionalStablecoinBridge.sol"
      - "sdk/typescript/src/crypto/tee.ts"
      - "sdk/typescript/src/core/client.ts"
      - "contracts/.gitignore"
      - ".gitignore"
      - "services/tee-worker/nitro-sdk/.gitignore"
      - ".github/workflows/audit-config-guards.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "integrations/docker/**"
      - "tools/devnet/**"
      - "scripts/validate-compose-security.sh"
      - "scripts/validate-devnet-genesis.py"
      - "scripts/validate-pouw-medium-guards.sh"
      - "scripts/validate-low-findings-guards.sh"
      - "x/pouw/keeper/staking.go"
      - "x/pouw/keeper/consensus_testing_override_nonprod.go"
      - "crates/core/src/pillars/quadratic_burn.rs"
      - "crates/core/src/pillars/vector_vault.rs"
      - "contracts/contracts/AethelredBridge.sol"
      - "contracts/contracts/InstitutionalStablecoinBridge.sol"
      - "sdk/typescript/src/crypto/tee.ts"
      - "sdk/typescript/src/core/client.ts"
      - "contracts/.gitignore"
      - ".gitignore"
      - "services/tee-worker/nitro-sdk/.gitignore"
      - ".github/workflows/audit-config-guards.yml"

jobs:
  compose-and-genesis-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate non-dev compose files disallow simulated mode/default creds
        run: |
          bash ./scripts/validate-compose-security.sh .

      - name: Validate devnet genesis security floors
        run: |
          python3 ./scripts/validate-devnet-genesis.py ./tools/devnet/genesis.json

      - name: Validate PoUW medium code guards
        run: |
          bash ./scripts/validate-pouw-medium-guards.sh .

      - name: Validate low finding code/hygiene guards
        run: |
          bash ./scripts/validate-low-findings-guards.sh .

      - name: Render integrations compose files
        run: |
          mkdir -p integrations/docker/secrets
          printf 'change-me-in-ci\n' > integrations/docker/secrets/grafana_admin_password.txt
          docker compose -f integrations/docker/docker-compose.yml config >/tmp/integrations-prod-compose.yaml
          docker compose -f integrations/docker/docker-compose.dev.yml config >/tmp/integrations-dev-compose.yaml
          test -s /tmp/integrations-prod-compose.yaml
          test -s /tmp/integrations-dev-compose.yaml
