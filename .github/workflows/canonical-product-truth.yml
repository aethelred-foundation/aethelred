name: Canonical Product Truth

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  canonical-product-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate canonical product truth
        run: python3 scripts/validate_canonical_product_truth.py
