name: Ecosystem Compatibility

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sundays at 06:00 UTC
    - cron: "0 6 * * 0"

permissions:
  contents: read

jobs:
  load-manifest:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout protocol repo
        uses: actions/checkout@v4

      - name: Build dApp matrix from manifest
        id: set-matrix
        run: |
          MATRIX=$(jq -c '{
            include: [
              .tiers.dapps[] | {
                app: .repo | split("/")[1],
                name: .name,
                sha: .pinned_sha,
                homepage: .homepage,
                package_manager: .package_manager,
                lockfile: .lockfile,
                install_command: .install_command,
                build_command: .build_command
              }
            ]
          }' ecosystem/manifest.json)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  compatibility:
    needs: load-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-manifest.outputs.matrix) }}
    name: "${{ matrix.name }}"
    steps:
      - name: Checkout protocol repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ matrix.package_manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20 (npm)
        if: ${{ matrix.package_manager == 'npm' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dapp/${{ matrix.lockfile }}

      - name: Setup Node.js 20 (pnpm)
        if: ${{ matrix.package_manager == 'pnpm' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: dapp/${{ matrix.lockfile }}

      - name: Clone dApp at pinned SHA
        env:
          APP_NAME: ${{ matrix.app }}
          APP_SHA: ${{ matrix.sha }}
        run: |
          git clone "https://github.com/aethelred-foundation/${APP_NAME}.git" dapp
          cd dapp
          git checkout "$APP_SHA"

      - name: Install dependencies
        working-directory: dapp
        run: ${{ matrix.install_command }}

      - name: Build dApp
        id: build
        working-directory: dapp
        run: ${{ matrix.build_command }}

      - name: Write step summary
        if: always()
        env:
          APP_DISPLAY_NAME: ${{ matrix.name }}
          APP_REPO: ${{ matrix.app }}
          APP_SHA: ${{ matrix.sha }}
          APP_HOMEPAGE: ${{ matrix.homepage }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          if [ "$BUILD_OUTCOME" == "success" ]; then
            STATUS="PASS"
            EMOJI="white_check_mark"
          else
            STATUS="FAIL"
            EMOJI="x"
          fi
          {
            echo "## :${EMOJI}: ${APP_DISPLAY_NAME} -- ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| App | **${APP_DISPLAY_NAME}** |"
            echo "| Repo | \`aethelred-foundation/${APP_REPO}\` |"
            echo "| Pinned SHA | \`${APP_SHA}\` |"
            echo "| Build Result | **${STATUS}** |"
            echo "| Homepage | ${APP_HOMEPAGE} |"
            echo "| Package Manager | \`${{ matrix.package_manager }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs: [load-manifest, compatibility]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compatibility results
        run: |
          {
            echo "## Ecosystem Compatibility Report"
            echo ""
            echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "See individual job results above for per-dApp build status."
            echo "This workflow is authoritative: if any pinned dApp fails to install or build, the workflow fails."
            echo ""
            echo "---"
            echo "*Triggered by: \`${GITHUB_EVENT_NAME}\`*"
          } >> "$GITHUB_STEP_SUMMARY"
