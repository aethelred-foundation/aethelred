name: Contracts CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop, "release/**"]
  workflow_dispatch:

jobs:
  changes:
    name: Detect contracts changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - '.github/workflows/contracts-ci.yml'

  hardhat-checks:
    name: Hardhat Checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.contracts == 'true' }}
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
      - name: Lint Solidity
        run: npm run lint
      - name: Compile contracts
        run: npm run compile
      - name: Run Hardhat tests
        run: npm run test
      - name: Contract size budget check
        run: npm run size

  foundry-checks:
    name: Foundry Checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.contracts == 'true' }}
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run Foundry unit and integration tests
        run: >
          FOUNDRY_PROFILE=ci forge test -vv
          --no-match-path 'test/*Invariant.t.sol'
          --no-match-test '^(testFuzz_|test_Audit_|invariant_)'

  foundry-deep-checks:
    name: Foundry Deep Checks (advisory)
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    # Advisory: invariant + fuzz suites may be non-deterministic; not part of required gate.
    continue-on-error: true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run Foundry deep invariant and audit suites
        run: |
          FOUNDRY_PROFILE=ci forge test -vv --match-path 'test/*Invariant.t.sol'
          FOUNDRY_PROFILE=ci forge test -vv --match-test '^(testFuzz_|test_Audit_)'

  contracts-required-gate:
    name: Contracts Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - changes
      - hardhat-checks
      - foundry-checks
    steps:
      - name: Enforce required gate status
        run: |
          echo "hardhat-checks=${{ needs.hardhat-checks.result }}"
          echo "foundry-checks=${{ needs.foundry-checks.result }}"
          test "${{ needs.hardhat-checks.result }}" = "success" || test "${{ needs.hardhat-checks.result }}" = "skipped"
          test "${{ needs.foundry-checks.result }}" = "success" || test "${{ needs.foundry-checks.result }}" = "skipped"
