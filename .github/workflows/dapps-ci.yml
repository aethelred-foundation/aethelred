name: dApps CI

on:
  push:
    branches: [main, develop, "release/**"]
    paths:
      - 'dApps/**'
  pull_request:
    branches: [main, develop, "release/**"]
    paths:
      - 'dApps/**'
  workflow_dispatch:

jobs:
  changes:
    name: Detect dApp changes
    runs-on: ubuntu-latest
    outputs:
      zeroid-backend: ${{ steps.filter.outputs.zeroid_backend }}
      zeroid-frontend: ${{ steps.filter.outputs.zeroid_frontend }}
      cruzible: ${{ steps.filter.outputs.cruzible }}
      noblepay: ${{ steps.filter.outputs.noblepay }}
      shiora: ${{ steps.filter.outputs.shiora }}
      terraqura: ${{ steps.filter.outputs.terraqura }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            zeroid_backend:
              - 'dApps/zeroid/backend/**'
            zeroid_frontend:
              - 'dApps/zeroid/**'
              - '!dApps/zeroid/backend/**'
            cruzible:
              - 'dApps/cruzible/**'
            noblepay:
              - 'dApps/noblepay/**'
            shiora:
              - 'dApps/shiora/**'
            terraqura:
              - 'dApps/terraqura/**'

  # ---------------------------------------------------------------------------
  # ZeroID Backend
  # ---------------------------------------------------------------------------
  zeroid-backend:
    name: ZeroID Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.zeroid-backend == 'true' }}
    defaults:
      run:
        working-directory: dApps/zeroid/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dApps/zeroid/backend/package-lock.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Security audit
        run: npm audit --omit=dev --audit-level=critical
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test -- --forceExit --ci
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # ZeroID Frontend
  # ---------------------------------------------------------------------------
  zeroid-frontend:
    name: ZeroID Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.zeroid-frontend == 'true' }}
    defaults:
      run:
        working-directory: dApps/zeroid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dApps/zeroid/package-lock.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Format check
        run: npm run format:check
      - name: Run tests with coverage
        run: npm run test:ci
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Cruzible
  # ---------------------------------------------------------------------------
  cruzible:
    name: Cruzible
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cruzible == 'true' }}
    defaults:
      run:
        working-directory: dApps/cruzible
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dApps/cruzible/package-lock.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Validate (type-check + lint + format + test)
        run: npm run validate
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # NoblePay
  # ---------------------------------------------------------------------------
  noblepay:
    name: NoblePay
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.noblepay == 'true' }}
    defaults:
      run:
        working-directory: dApps/noblepay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dApps/noblepay/package-lock.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Validate all components
        run: npm run validate
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Shiora
  # ---------------------------------------------------------------------------
  shiora:
    name: Shiora
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.shiora == 'true' }}
    defaults:
      run:
        working-directory: dApps/shiora
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dApps/shiora/package-lock.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Format check
        run: npm run format:check
      - name: Run tests with coverage
        run: npm run test -- --coverage --ci
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # TerraQura
  # ---------------------------------------------------------------------------
  terraqura:
    name: TerraQura
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.terraqura == 'true' }}
    defaults:
      run:
        working-directory: dApps/terraqura
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pnpm
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Install dependencies
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: pnpm install --frozen-lockfile
      - name: Lint
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: pnpm lint
      - name: Type-check
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: pnpm typecheck
      - name: Run tests
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: pnpm test
      - name: Build
        if: ${{ hashFiles('dApps/terraqura/package.json') != '' }}
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Required gate — all dApps must pass before merge
  # ---------------------------------------------------------------------------
  dapps-required-gate:
    name: dApps Required Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - zeroid-backend
      - zeroid-frontend
      - cruzible
      - noblepay
      - shiora
      - terraqura
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
         if [[ "${{ needs.zeroid-backend.result }}" != "skipped" && "${{ needs.zeroid-backend.result }}" != "success" ]] ||
             [[ "${{ needs.zeroid-frontend.result }}" != "skipped" && "${{ needs.zeroid-frontend.result }}" != "success" ]] ||
             [[ "${{ needs.cruzible.result }}" != "skipped" && "${{ needs.cruzible.result }}" != "success" ]] ||
             [[ "${{ needs.noblepay.result }}" != "skipped" && "${{ needs.noblepay.result }}" != "success" ]] ||
             [[ "${{ needs.shiora.result }}" != "skipped" && "${{ needs.shiora.result }}" != "success" ]] ||
             [[ "${{ needs.terraqura.result }}" != "skipped" && "${{ needs.terraqura.result }}" != "success" ]]; then
            echo "One or more dApps CI jobs failed:"
            echo "  zeroid-backend: ${{ needs.zeroid-backend.result }}"
            echo "  zeroid-frontend: ${{ needs.zeroid-frontend.result }}"
            echo "  cruzible: ${{ needs.cruzible.result }}"
            echo "  noblepay: ${{ needs.noblepay.result }}"
            echo "  shiora: ${{ needs.shiora.result }}"
            echo "  terraqura: ${{ needs.terraqura.result }}"
            exit 1
          fi
          echo "All dApps CI gates passed."
