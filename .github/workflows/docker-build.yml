name: Docker Build & Push

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*", "testnet-v*", "mainnet-v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aethelred-foundation/aethelred/aethelredd

jobs:
  docker-build:
    name: Build & Push Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          docker build -t aethelredd:ci-test \
            --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} .
          docker run --rm aethelredd:ci-test version || true

  docker-required-gate:
    name: Docker Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Enforce required gate status
        run: |
          echo "docker-build=${{ needs.docker-build.result }}"
          test "${{ needs.docker-build.result }}" = "success"
