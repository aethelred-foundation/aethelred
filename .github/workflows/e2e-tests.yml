name: E2E Chain Tests

on:
  pull_request:
    branches: [main, "release/**"]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  GO_VERSION: "1.24.6"
  GOFLAGS: "-mod=mod"

jobs:
  e2e-tests:
    name: E2E Chain Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build validator binary
        run: go build -o build/aethelredd ./cmd/aethelredd/

      - name: Run E2E keeper tests
        run: go test -v -tags=e2e -timeout 20m -run TestEndToEnd ./x/pouw/keeper/...

      - name: Compile loadtest package
        run: go test -run TestDoesNotExist ./tools/tools/loadtest/...

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/

  e2e-docker-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SDK and CLI tools
        run: |
          cd sdk/typescript && npm ci && npm run build
          cd ../../tools/cli/aethel && npm ci && npm run build
          cd ../seal-verifier && npm ci && npm run build

      - name: Start mock local testnet
        run: |
          docker compose \
            -f integrations/deploy/docker/docker-compose.local-testnet.yml \
            --profile mock up -d --build --wait
        timeout-minutes: 5

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:26657/health >/dev/null 2>&1; then
              echo "Mock RPC healthy"
              break
            fi
            sleep 2
          done

      - name: Run CLI smoke tests
        env:
          AETHELRED_SMOKE_SKIP_AETH_CLI: "1"
        run: bash scripts/devtools-cli-smoke.sh

      - name: Run real-node E2E gate tests
        env:
          AETHELRED_REAL_NODE_E2E: "1"
          AETHELRED_SMOKE_RPC_URL: "http://127.0.0.1:26657"
          AETHELRED_SMOKE_FASTAPI_URL: "http://127.0.0.1:8000"
        run: go test -v -timeout 5m -run "TestEndToEnd_RealNodeDockerSmokeGate|TestEndToEnd_MultiValidatorTopology" ./x/pouw/keeper/...

      - name: Run deterministic exploit simulation
        env:
          AETHELRED_SCENARIO_SEED: "42"
        run: |
          go test -run TestDoesNotExist ./tools/tools/loadtest/...

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
            -f integrations/deploy/docker/docker-compose.local-testnet.yml \
            --profile mock down -v

  e2e-required-gate:
    name: E2E Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - e2e-tests
      - e2e-docker-smoke
    steps:
      - name: Enforce required gate status
        run: |
          echo "e2e-tests=${{ needs.e2e-tests.result }}"
          echo "e2e-docker-smoke=${{ needs.e2e-docker-smoke.result }}"
          test "${{ needs.e2e-tests.result }}" = "success"
          test "${{ needs.e2e-docker-smoke.result }}" = "success"
