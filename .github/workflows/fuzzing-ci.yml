name: Fuzzing CI

on:
  pull_request:
    branches: [main, develop, release/**]
  schedule:
    # Run nightly at 02:00 UTC for extended fuzzing
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzz duration per target (e.g., 30s, 5m)"
        default: "30s"

env:
  GO_VERSION: "1.24.6"
  RUST_VERSION: "1.75"
  GOFLAGS: "-mod=mod"
  # PR runs use short duration; nightly/manual can use longer
  FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || (github.event_name == 'schedule' && '5m' || '30s') }}

jobs:
  go-fuzz:
    name: Go Native Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Fuzz VoteExtension Unmarshal
        run: go test -fuzz=FuzzVoteExtensionUnmarshal -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz VoteExtension SignVerify
        run: go test -fuzz=FuzzVoteExtensionSignVerify -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz AggregateVoteExtensions
        run: go test -fuzz=FuzzAggregateVoteExtensions -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz InjectedVoteExtensionTx
        run: go test -fuzz=FuzzInjectedVoteExtensionTx -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-fuzz-corpus
          path: |
            **/testdata/fuzz/
          retention-days: 30

  rust-fuzz:
    name: Rust Cargo-Fuzz (PQC Crypto)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz hybrid_signature_from_bytes
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_hybrid_signature_from_bytes -- -max_total_time=$(echo ${{ env.FUZZ_DURATION }} | sed 's/s//' | sed 's/m/*60/' | bc)
        continue-on-error: false

      - name: Fuzz hybrid_pubkey_from_bytes
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_hybrid_pubkey_from_bytes -- -max_total_time=$(echo ${{ env.FUZZ_DURATION }} | sed 's/s//' | sed 's/m/*60/' | bc)
        continue-on-error: false

      - name: Fuzz kyber_pubkey_from_bytes
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_kyber_pubkey_from_bytes -- -max_total_time=$(echo ${{ env.FUZZ_DURATION }} | sed 's/s//' | sed 's/m/*60/' | bc)
        continue-on-error: false

      - name: Fuzz signature_roundtrip
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_signature_roundtrip -- -max_total_time=$(echo ${{ env.FUZZ_DURATION }} | sed 's/s//' | sed 's/m/*60/' | bc)
        continue-on-error: false

      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-fuzz-corpus
          path: |
            crates/core/fuzz/corpus/
          retention-days: 30

  fuzzing-required-gate:
    name: Fuzzing Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - go-fuzz
      - rust-fuzz
    steps:
      - name: Enforce fuzzing gate
        run: |
          echo "go-fuzz=${{ needs.go-fuzz.result }}"
          echo "rust-fuzz=${{ needs.rust-fuzz.result }}"
          test "${{ needs.go-fuzz.result }}" = "success"
          test "${{ needs.rust-fuzz.result }}" = "success"
