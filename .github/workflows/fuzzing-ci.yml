name: Fuzzing CI

on:
  pull_request:
    branches: [main, develop, release/**]
  schedule:
    # Run nightly at 02:00 UTC for extended fuzzing
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzz duration per target (e.g., 30s, 5m)"
        default: "30s"

env:
  GO_VERSION: "1.24.6"
  RUST_VERSION: "1.75"
  GOFLAGS: "-mod=mod"
  # PR runs use short duration; nightly/manual can use longer
  FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || (github.event_name == 'schedule' && '5m' || '30s') }}

jobs:
  go-fuzz:
    name: Go Native Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Fuzz VoteExtension Unmarshal
        run: go test -fuzz=FuzzVoteExtensionUnmarshal -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz VoteExtension SignVerify
        run: go test -fuzz=FuzzVoteExtensionSignVerify -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz AggregateVoteExtensions
        run: go test -fuzz=FuzzAggregateVoteExtensions -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Fuzz InjectedVoteExtensionTx
        run: go test -fuzz=FuzzInjectedVoteExtensionTx -fuzztime=${{ env.FUZZ_DURATION }} ./app/

      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-fuzz-corpus
          path: |
            **/testdata/fuzz/
          retention-days: 30

  rust-fuzz:
    name: Rust Cargo-Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # Vendor fuzz-only deps (libfuzzer-sys) into vendor/ so builds work
      # with the repo's vendored source replacement policy intact.
      # Local bootstrap: ./scripts/vendor-fuzz-deps.sh
      - name: Vendor fuzz dependencies (supply-chain compliant)
        run: |
          chmod +x scripts/vendor-fuzz-deps.sh
          ./scripts/vendor-fuzz-deps.sh

      # Compile-check gate: verify all fuzz crates build before long fuzz runs
      - name: "gate: compile-check all fuzz crates"
        run: |
          for crate in crates/core/fuzz crates/bridge/fuzz crates/consensus/fuzz crates/vm/fuzz; do
            echo "::group::cargo check ${crate}"
            cargo +nightly check --manifest-path "${crate}/Cargo.toml"
            echo "::endgroup::"
          done

      # --- core/fuzz targets ---
      - name: "core: fuzz_hybrid_signature_from_bytes"
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_hybrid_signature_from_bytes -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "core: fuzz_hybrid_pubkey_from_bytes"
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_hybrid_pubkey_from_bytes -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "core: fuzz_kyber_pubkey_from_bytes"
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_kyber_pubkey_from_bytes -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "core: fuzz_signature_roundtrip"
        working-directory: crates/core
        run: cargo +nightly fuzz run fuzz_signature_roundtrip -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      # --- bridge/fuzz targets ---
      - name: "bridge: fuzz_bridge_event_parsing"
        working-directory: crates/bridge
        run: cargo +nightly fuzz run fuzz_bridge_event_parsing -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "bridge: fuzz_bridge_state_transition"
        working-directory: crates/bridge
        run: cargo +nightly fuzz run fuzz_bridge_state_transition -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      # --- consensus/fuzz targets ---
      - name: "consensus: fuzz_vrf_prove_verify"
        working-directory: crates/consensus
        run: cargo +nightly fuzz run fuzz_vrf_prove_verify -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "consensus: fuzz_reputation_score"
        working-directory: crates/consensus
        run: cargo +nightly fuzz run fuzz_reputation_score -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      # --- vm/fuzz targets ---
      - name: "vm: fuzz_vm_bytecode_execution"
        working-directory: crates/vm
        run: cargo +nightly fuzz run fuzz_vm_bytecode_execution -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: "vm: fuzz_precompile_inputs"
        working-directory: crates/vm
        run: cargo +nightly fuzz run fuzz_precompile_inputs -- -max_total_time="${FUZZ_SECONDS}"
        env:
          FUZZ_SECONDS: ${{ env.FUZZ_DURATION == '5m' && '300' || '30' }}

      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-fuzz-corpus
          path: |
            crates/core/fuzz/corpus/
            crates/bridge/fuzz/corpus/
            crates/consensus/fuzz/corpus/
            crates/vm/fuzz/corpus/
          retention-days: 30

  fuzzing-required-gate:
    name: Fuzzing Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - go-fuzz
      - rust-fuzz
    steps:
      - name: Enforce fuzzing gate
        run: |
          echo "go-fuzz=${{ needs.go-fuzz.result }}"
          echo "rust-fuzz=${{ needs.rust-fuzz.result }}"
          test "${{ needs.go-fuzz.result }}" = "success"
          test "${{ needs.rust-fuzz.result }}" = "success"
