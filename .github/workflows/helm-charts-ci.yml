name: Helm Charts CI

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-charts-ci.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-charts-ci.yml"

jobs:
  helm-lint-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1

      - name: Helm version
        run: helm version --short

      - name: Lint charts
        run: |
          helm lint deploy/helm/aethelred-verification-gateway
          helm lint deploy/helm/aethelred-validator

      - name: Render verification gateway chart (FastAPI + Next.js profiles)
        run: |
          helm template verifier-fastapi deploy/helm/aethelred-verification-gateway \
            -f deploy/helm/aethelred-verification-gateway/values/fastapi.yaml > /tmp/verifier-fastapi.yaml
          helm template verifier-nextjs deploy/helm/aethelred-verification-gateway \
            -f deploy/helm/aethelred-verification-gateway/values/nextjs.yaml > /tmp/verifier-nextjs.yaml
          test -s /tmp/verifier-fastapi.yaml
          test -s /tmp/verifier-nextjs.yaml

      - name: Render validator chart (staging + production profiles)
        run: |
          helm template validator-staging deploy/helm/aethelred-validator \
            -f deploy/helm/aethelred-validator/values/staging.yaml > /tmp/validator-staging.yaml
          helm template validator-production deploy/helm/aethelred-validator \
            -f deploy/helm/aethelred-validator/values/production.yaml > /tmp/validator-production.yaml
          test -s /tmp/validator-staging.yaml
          test -s /tmp/validator-production.yaml
