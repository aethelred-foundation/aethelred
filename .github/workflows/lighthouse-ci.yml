name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'dApps/**'

jobs:
  lighthouse:
    name: Lighthouse – ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: cruzible
            working-directory: dApps/cruzible
          - app: noblepay
            working-directory: dApps/noblepay
          - app: shiora
            working-directory: dApps/shiora
          - app: zeroid
            working-directory: dApps/zeroid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.working-directory }}
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ${{ matrix.working-directory }}/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ matrix.app }}
          path: ${{ matrix.working-directory }}/.lighthouseci/
          retention-days: 14

  terraqura-lighthouse:
    name: Lighthouse - TerraQura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        working-directory: dApps/terraqura
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: dApps/terraqura
        run: pnpm turbo build --filter=web

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: dApps/terraqura/apps/web/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-terraqura
          path: dApps/terraqura/apps/web/.lighthouseci/
          retention-days: 14
