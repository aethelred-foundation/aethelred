name: Load Testing

on:
  pull_request:
    branches: [main, develop, "release/**"]
  push:
    branches: [main, develop, "release/**"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Load test profile"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - baseline
          - byzantine
          - network-stress

env:
  GO_VERSION: "1.24.6"
  GOFLAGS: "-mod=mod"

jobs:
  loadtest:
    name: Run Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine test mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "mode=baseline" >> "$GITHUB_OUTPUT"
          else
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Run selected load test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/loadtest
          case "${{ steps.mode.outputs.mode }}" in
            smoke)
              go test -v ./tools/tools/loadtest/...
              ;;
            baseline)
              go test -v ./tools/tools/loadtest/...
              ;;
            byzantine)
              go test -v ./tools/tools/loadtest/...
              ;;
            network-stress)
              go test -v ./tools/tools/loadtest/...
              ;;
            *)
              echo "unsupported mode: ${{ steps.mode.outputs.mode }}" >&2
              exit 1
              ;;
          esac

      - name: Upload load test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results-${{ steps.mode.outputs.mode }}
          path: |
            artifacts/loadtest/**
            loadtest-results/**

  loadtest-required-gate:
    name: Load Test Required Gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - loadtest
    steps:
      - name: Enforce required gate status
        run: |
          echo "loadtest=${{ needs.loadtest.result }}"
          test "${{ needs.loadtest.result }}" = "success"
