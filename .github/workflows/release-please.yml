name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Explain release automation skip
        if: ${{ secrets.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "Release Please is skipped on this repository because RELEASE_PLEASE_TOKEN is not configured."
          echo "Configure a dedicated token with pull-request creation rights to enable automated release PRs."

      - name: Run release please
        if: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
