name: Repo Auditability Guard

on:
  pull_request:
    paths:
      - 'docs/governance/repo-auditability-registry.json'
      - 'scripts/validate-repo-auditability.py'
      - 'docs/audits/aethel-mr-003-repo-auditability-rollout-matrix.md'
      - '.github/workflows/repo-auditability-guard.yml'
  push:
    branches: [main, master]
    paths:
      - 'docs/governance/repo-auditability-registry.json'
      - 'scripts/validate-repo-auditability.py'
      - 'docs/audits/aethel-mr-003-repo-auditability-rollout-matrix.md'
      - '.github/workflows/repo-auditability-guard.yml'
  workflow_dispatch:

jobs:
  validate-repo-auditability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate repo auditability baseline registry and local clone expectations
        run: |
          set -euo pipefail
          python3 scripts/validate-repo-auditability.py --write-matrix
      - name: Ensure rollout matrix is up to date
        run: |
          set -euo pipefail
          git diff --exit-code -- docs/audits/aethel-mr-003-repo-auditability-rollout-matrix.md
