name: Rust Coverage & Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "release/**"]

env:
  RUST_VERSION: "1.85.0"

jobs:
  rust-coverage:
    name: Rust Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Collect coverage (core crate)
        run: |
          cargo llvm-cov \
            --manifest-path crates/core/Cargo.toml \
            --features full-pqc \
            --lcov --output-path core-lcov.info

      - name: Collect coverage (consensus crate)
        run: |
          cargo llvm-cov \
            --manifest-path crates/consensus/Cargo.toml \
            --lcov --output-path consensus-lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: core-lcov.info,consensus-lcov.info
          flags: rust
          fail_ci_if_error: false

  crypto-benchmarks:
    name: Crypto Benchmark Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2

      - name: Run crypto benchmarks
        run: |
          cargo bench \
            --manifest-path sdk/aethelred-sdk/Cargo.toml \
            --bench crypto_benchmarks \
            -- --output-format bencher 2>&1 | tee bench-results.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench-results.txt
          fail-on-alert: true
          alert-threshold: "130%"
          comment-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
