name: SDK Release Readiness

on:
  pull_request:
    paths:
      - "sdk/**"
      - "docs/sdk/**"
      - "version-matrix.json"
      - "scripts/check_sdk_versions.py"
      - ".github/workflows/sdk-release-readiness.yml"
  workflow_dispatch:

jobs:
  version-matrix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check SDK versions and docs matrix consistency
        run: python3 scripts/check_sdk_versions.py

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (CJS/ESM + declarations)
        run: npm run build
      - name: Pack (dry-run)
        run: npm pack --dry-run --loglevel=error

  go-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Run full Go SDK test suite
        run: go test ./...

  rust-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust format check
        run: cargo fmt --all -- --check
      - name: Rust tests
        run: cargo test --lib
      - name: Cargo package (dry-run-ish)
        run: cargo package --no-verify

  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build frontend (locked)
        run: python -m pip install -r build-requirements.txt
      - name: Build wheel + sdist (isolated, vendored backend)
        run: python -m build
      - name: Install built wheel and import smoke test
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import aethelred
          print(aethelred.__version__)
          PY
