name: SDK Standalone Sync

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which SDK(s) to sync"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - typescript
          - rust
      push:
        description: "Push sync branch to standalone repo"
        required: true
        default: false
        type: boolean
      create_pr:
        description: "Create PR in standalone repo after push"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - "sdk/typescript/**"
      - "sdk/rust/**"
      - "scripts/export-sdk-standalone-repo.sh"
      - "scripts/sync-standalone-sdk.sh"
      - "sdk/repo-templates/**"
      - "docs/sdk/REPO_SPLIT_PLAYBOOK.md"
      - ".github/workflows/sdk-standalone-sync.yml"

permissions:
  contents: read

concurrency:
  group: sdk-standalone-sync-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [typescript, rust]
    env:
      SDK_TS_REPO: ${{ vars.SDK_TYPESCRIPT_STANDALONE_REPO }}
      SDK_RUST_REPO: ${{ vars.SDK_RUST_STANDALONE_REPO }}
      SDK_STANDALONE_AUTO_PUSH: ${{ vars.SDK_STANDALONE_AUTO_PUSH }}
      SDK_STANDALONE_AUTO_PR: ${{ vars.SDK_STANDALONE_AUTO_PR }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine whether matrix item should run
        id: select
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            target="${{ github.event.inputs.target }}"
            if [[ "$target" == "all" || "$target" == "${{ matrix.sdk }}" ]]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: ${{ steps.select.outputs.run == 'true' && matrix.sdk == 'typescript' }}
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/typescript/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.select.outputs.run == 'true' && matrix.sdk == 'rust' }}

      - name: Export + validate standalone SDK
        if: ${{ steps.select.outputs.run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/sync-standalone-sdk.sh --sdk "${{ matrix.sdk }}" --validate

      - name: Resolve sync target + mode
        if: ${{ steps.select.outputs.run == 'true' }}
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.sdk }}" == "typescript" ]]; then
            target_repo="${SDK_TS_REPO}"
          else
            target_repo="${SDK_RUST_REPO}"
          fi
          echo "target_repo=${target_repo}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.push }}" == "true" ]]; then
              echo "do_push=true" >> "$GITHUB_OUTPUT"
            else
              echo "do_push=false" >> "$GITHUB_OUTPUT"
            fi
            if [[ "${{ github.event.inputs.create_pr }}" == "true" ]]; then
              echo "do_pr=true" >> "$GITHUB_OUTPUT"
            else
              echo "do_pr=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [[ "${SDK_STANDALONE_AUTO_PUSH}" == "true" ]]; then
              echo "do_push=true" >> "$GITHUB_OUTPUT"
            else
              echo "do_push=false" >> "$GITHUB_OUTPUT"
            fi
            if [[ "${SDK_STANDALONE_AUTO_PR}" == "false" ]]; then
              echo "do_pr=false" >> "$GITHUB_OUTPUT"
            else
              echo "do_pr=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Push sync branch / create PR (optional)
        if: ${{ steps.select.outputs.run == 'true' && steps.mode.outputs.do_push == 'true' && steps.mode.outputs.target_repo != '' }}
        env:
          GH_TOKEN: ${{ secrets.SDK_STANDALONE_SYNC_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing SDK_STANDALONE_SYNC_TOKEN secret"
            exit 1
          fi
          BRANCH="monorepo-sync-${{ matrix.sdk }}-${GITHUB_SHA::12}"
          BODY=$'Automated sync from the canonical AETHELRED monorepo.\n\nSource commit: '"${GITHUB_SHA}"
          args=(
            --sdk "${{ matrix.sdk }}"
            --validate
            --push-repo "${{ steps.mode.outputs.target_repo }}"
            --branch "${BRANCH}"
            --commit-message "chore: sync ${{ matrix.sdk }} SDK from monorepo (${GITHUB_SHA::12})"
          )
          if [[ "${{ steps.mode.outputs.do_pr }}" == "true" ]]; then
            args+=(--create-pr --pr-title "chore: sync ${{ matrix.sdk }} SDK from monorepo (${GITHUB_SHA::7})" --pr-body "${BODY}")
          fi
          ./scripts/sync-standalone-sdk.sh "${args[@]}"

      - name: Summary (no push)
        if: ${{ steps.select.outputs.run == 'true' && steps.mode.outputs.do_push != 'true' }}
        run: |
          echo "Validated standalone export for ${{ matrix.sdk }}."
          echo "Push disabled. Use workflow_dispatch with push=true or set repo variables + auto-push vars."
