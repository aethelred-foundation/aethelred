name: Staging and Canary Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - canary
          - production
      image_tag:
        description: "Validator image tag to deploy"
        required: true
        default: latest
        type: string

permissions:
  contents: read

jobs:
  deployment-policy:
    name: Deployment Policy
    runs-on: ubuntu-latest
    outputs:
      should_run_deploy: ${{ steps.policy.outputs.should_run_deploy }}
      selected_target: ${{ steps.policy.outputs.selected_target }}
    steps:
      - id: policy
        name: Resolve deploy policy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run_deploy=true" >> "$GITHUB_OUTPUT"
            echo "selected_target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ vars.ENABLE_AUTO_STAGING_DEPLOY }}" = "true" ]; then
            echo "should_run_deploy=true" >> "$GITHUB_OUTPUT"
            echo "selected_target=staging" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run_deploy=false" >> "$GITHUB_OUTPUT"
          echo "selected_target=none" >> "$GITHUB_OUTPUT"

      - name: Report deploy policy
        run: |
          if [ "${{ steps.policy.outputs.should_run_deploy }}" = "true" ]; then
            echo "Deploy workflow active for target: ${{ steps.policy.outputs.selected_target }}"
          else
            echo "Auto deploy disabled for push events; set ENABLE_AUTO_STAGING_DEPLOY=true or use workflow_dispatch."
          fi

  audit-signoff-gate:
    name: Audit Signoff Gate
    if: ${{ needs.deployment-policy.outputs.should_run_deploy == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - deployment-policy
    steps:
      - uses: actions/checkout@v6
      - name: Verify external audit signoff (contracts + consensus)
        run: make audit-signoff-check

  deploy-staging:
    name: Deploy Staging
    if: ${{ needs.deployment-policy.outputs.selected_target == 'staging' }}
    runs-on: ubuntu-latest
    environment: staging
    needs:
      - deployment-policy
      - audit-signoff-gate
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Deploy staging release
        run: |
          IMAGE_TAG="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          fi
          helm upgrade --install aethelred-validator \
            ./deploy/helm/aethelred-validator \
            --namespace aethelred-staging \
            --create-namespace \
            -f ./deploy/helm/aethelred-validator/values.yaml \
            -f ./deploy/helm/aethelred-validator/values/staging.yaml \
            --set validator.image.tag="${IMAGE_TAG}" \
            --wait --timeout 10m
      - name: Staging smoke checks
        run: |
          kubectl -n aethelred-staging rollout status statefulset/aethelred-validator-aethelred-validator --timeout=600s
          kubectl -n aethelred-staging get pods -o wide

  deploy-canary:
    name: Deploy Canary
    if: ${{ needs.deployment-policy.outputs.selected_target == 'canary' }}
    runs-on: ubuntu-latest
    environment: canary
    needs:
      - deployment-policy
      - audit-signoff-gate
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Deploy canary release
        run: |
          helm upgrade --install aethelred-validator-canary \
            ./deploy/helm/aethelred-validator \
            --namespace aethelred-canary \
            --create-namespace \
            -f ./deploy/helm/aethelred-validator/values.yaml \
            -f ./deploy/helm/aethelred-validator/values/canary.yaml \
            --set validator.image.tag="${{ inputs.image_tag }}" \
            --wait --timeout 10m
      - name: Canary health checks
        run: |
          kubectl -n aethelred-canary rollout status statefulset/aethelred-validator-canary-aethelred-validator --timeout=600s
          kubectl -n aethelred-canary get pods -o wide

  deploy-production:
    name: Promote Production
    if: ${{ needs.deployment-policy.outputs.selected_target == 'production' }}
    runs-on: ubuntu-latest
    environment: production
    needs:
      - deployment-policy
      - audit-signoff-gate
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Promote release to production
        run: |
          helm upgrade --install aethelred-validator \
            ./deploy/helm/aethelred-validator \
            --namespace aethelred-mainnet \
            --create-namespace \
            -f ./deploy/helm/aethelred-validator/values.yaml \
            -f ./deploy/helm/aethelred-validator/values/production.yaml \
            --set validator.image.tag="${{ inputs.image_tag }}" \
            --wait --timeout 15m
      - name: Production verification
        run: |
          kubectl -n aethelred-mainnet rollout status statefulset/aethelred-validator-aethelred-validator --timeout=900s
          kubectl -n aethelred-mainnet get pods -o wide
