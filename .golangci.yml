version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - all
        - -QF*
        - -ST*
  exclusions:
    rules:
      # Proto-generated types embed protoimpl.MessageState which contains sync.Mutex.
      # Passing proto messages by value is required by several APIs (collections.Set,
      # index closure callbacks, etc.) and cannot be avoided without modifying
      # generated code. This exclusion is standard across Cosmos SDK chains.
      - text: "protoimpl\\.MessageState"
        linters:
          - govet
