apiVersion: v1
kind: Service
metadata:
  name: {{ include "aethelred-validator.fullname" . }}
  namespace: {{ include "aethelred-validator.namespace" . }}
  labels:
    {{- include "aethelred-validator.labels" . | nindent 4 }}
  {{- with .Values.service.headless.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.headless.type }}
  clusterIP: None
  ports:
    - name: p2p
      port: 26656
      targetPort: p2p
    - name: rpc
      port: 26657
      targetPort: rpc
    - name: grpc
      port: 9090
      targetPort: grpc
    - name: api
      port: 1317
      targetPort: api
  selector:
    app.kubernetes.io/name: {{ include "aethelred-validator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.service.rpc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aethelred-validator.fullname" . }}-rpc
  namespace: {{ include "aethelred-validator.namespace" . }}
  labels:
    {{- include "aethelred-validator.labels" . | nindent 4 }}
  {{- with .Values.service.rpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.rpc.type }}
  ports:
    - name: rpc
      port: 26657
      targetPort: rpc
    - name: api
      port: 1317
      targetPort: api
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app.kubernetes.io/name: {{ include "aethelred-validator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
