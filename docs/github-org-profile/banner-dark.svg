  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101520"/>
      <stop offset="55%" stop-color="#182133"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="360" fill="url(#bg)"/>
  <circle cx="1220" cy="85" r="120" fill="#ff8e47" opacity="0.3"/>
