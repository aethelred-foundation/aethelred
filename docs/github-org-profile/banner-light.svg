<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="360" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">Aethelred GitHub banner</title>
  <desc id="desc">Light theme banner for the Aethelred GitHub organization profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6e9"/>
      <stop offset="55%" stop-color="#f3efe9"/>
      <stop offset="100%" stop-color="#e8f0ff"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="360" fill="url(#bg)"/>
  <circle cx="1240" cy="90" r="120" fill="#ffd7a8" opacity="0.55"/>
  <circle cx="1320" cy="250" r="150" fill="#b8d1ff" opacity="0.45"/>
  <circle cx="170" cy="70" r="90" fill="#ffb980" opacity="0.35"/>
  <text x="110" y="155" fill="#211712" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700">Aethelred</text>
  <text x="112" y="208" fill="#4f3a2b" font-family="Verdana, Geneva, sans-serif" font-size="24">Canonical Layer 1 source, governance, and release provenance for verifiable AI.</text>
  <text x="112" y="252" fill="#5d6677" font-family="Verdana, Geneva, sans-serif" font-size="19">Proof-of-Useful-Work | Zero-knowledge verification | TEE-backed attestation</text>
</svg>
