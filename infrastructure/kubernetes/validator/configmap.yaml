apiVersion: v1
kind: ConfigMap
metadata:
  name: aethelred-config
  namespace: aethelred
data:
  chain_id: "aethelred-mainnet-1"
  persistent_peers: ""
  min_gas_price: "0.025uaeth"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aethelred-validator-config
  namespace: aethelred
data:
  app.toml: |
    # Aethelred Validator Configuration
    minimum-gas-prices = "0.025uaeth"
    pruning = "nothing"
    pruning-keep-recent = "0"
    pruning-keep-every = "0"
    pruning-interval = "0"
    halt-height = 0
    halt-time = 0
    min-retain-blocks = 0
    inter-block-cache = true
    index-events = ["tx.hash", "tx.height", "seal.id", "job.id"]
    iavl-cache-size = 10000
    iavl-disable-fastnode = false
    app-db-backend = "goleveldb"

    [telemetry]
    enabled = true
    prometheus-retention-time = 60
    global-labels = [["chain_id", "aethelred-mainnet-1"]]

    [api]
    enable = true
    swagger = true
    address = "tcp://0.0.0.0:1317"
    max-open-connections = 1000
    rpc-read-timeout = 10
    rpc-write-timeout = 10
    rpc-max-body-bytes = 10000000
    enabled-unsafe-cors = false

    [grpc]
    enable = true
    address = "0.0.0.0:9090"
    max-recv-msg-size = "104857600"
    max-send-msg-size = "104857600"

    [grpc-web]
    enable = true
    address = "0.0.0.0:9091"
    enable-unsafe-cors = false

    [state-sync]
    snapshot-interval = 1000
    snapshot-keep-recent = 2

    [store]
    streamers = []

    # Aethelred-specific configuration
    [pouw]
    # Proof-of-Useful-Work consensus settings
    max-compute-jobs-per-block = 100
    compute-timeout = "30s"
    min-validators-for-verification = 3

    [tee]
    # TEE configuration
    enabled = true
    attestation-service = "https://attestation.aethelred.io"
    refresh-interval = "1h"

    [zkml]
    # zkML prover configuration
    enabled = true
    prover-address = "localhost:9092"
    max-proof-size = 10000000
    proof-timeout = "60s"

    [seal]
    # Digital Seal configuration
    auto-seal = true
    seal-batch-size = 50
    seal-interval = "5s"

  config.toml: |
    # CometBFT Configuration
    proxy_app = "tcp://127.0.0.1:26658"
    moniker = "validator"
    db_backend = "goleveldb"
    db_dir = "data"
    log_level = "info"
    log_format = "json"
    genesis_file = "config/genesis.json"
    priv_validator_key_file = "config/priv_validator_key.json"
    priv_validator_state_file = "data/priv_validator_state.json"
    priv_validator_laddr = ""
    node_key_file = "config/node_key.json"
    abci = "socket"
    filter_peers = false

    [rpc]
    laddr = "tcp://0.0.0.0:26657"
    cors_allowed_origins = []
    cors_allowed_methods = ["HEAD", "GET", "POST"]
    cors_allowed_headers = ["Origin", "Accept", "Content-Type", "X-Requested-With", "X-Server-Time"]
    grpc_laddr = ""
    grpc_max_open_connections = 900
    unsafe = false
    max_open_connections = 900
    max_subscription_clients = 100
    max_subscriptions_per_client = 5
    experimental_subscription_buffer_size = 200
    experimental_websocket_write_buffer_size = 200
    experimental_close_on_slow_client = false
    timeout_broadcast_tx_commit = "10s"
    max_body_bytes = 10000000
    max_header_bytes = 1048576
    tls_cert_file = ""
    tls_key_file = ""
    pprof_laddr = "localhost:6060"

    [p2p]
    laddr = "tcp://0.0.0.0:26656"
    external_address = ""
    seeds = ""
    persistent_peers = ""
    addr_book_file = "config/addrbook.json"
    addr_book_strict = true
    max_num_inbound_peers = 40
    max_num_outbound_peers = 10
    unconditional_peer_ids = ""
    persistent_peers_max_dial_period = "0s"
    flush_throttle_timeout = "100ms"
    max_packet_msg_payload_size = 1024
    send_rate = 5120000
    recv_rate = 5120000
    pex = true
    seed_mode = false
    private_peer_ids = ""
    allow_duplicate_ip = false
    handshake_timeout = "20s"
    dial_timeout = "3s"

    [mempool]
    type = "flood"
    recheck = true
    broadcast = true
    wal_dir = ""
    size = 5000
    max_txs_bytes = 1073741824
    cache_size = 10000
    keep-invalid-txs-in-cache = false
    max_tx_bytes = 10485760
    max_batch_bytes = 0

    [statesync]
    enable = false
    rpc_servers = ""
    trust_height = 0
    trust_hash = ""
    trust_period = "168h0m0s"
    discovery_time = "15s"
    temp_dir = ""
    chunk_request_timeout = "10s"
    chunk_fetchers = "4"

    [blocksync]
    version = "v0"

    [consensus]
    wal_file = "data/cs.wal/wal"
    timeout_propose = "3s"
    timeout_propose_delta = "500ms"
    timeout_prevote = "1s"
    timeout_prevote_delta = "500ms"
    timeout_precommit = "1s"
    timeout_precommit_delta = "500ms"
    timeout_commit = "5s"
    double_sign_check_height = 0
    skip_timeout_commit = false
    create_empty_blocks = true
    create_empty_blocks_interval = "0s"
    peer_gossip_sleep_duration = "100ms"
    peer_query_maj23_sleep_duration = "2s"

    [storage]
    discard_abci_responses = false

    [tx_index]
    indexer = "kv"
    psql-conn = ""

    [instrumentation]
    prometheus = true
    prometheus_listen_addr = ":26660"
    max_open_connections = 3
    namespace = "cometbft"
