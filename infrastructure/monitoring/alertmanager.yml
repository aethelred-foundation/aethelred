# ============================================================================
# Alertmanager Configuration for Aethelred Protocol
# ============================================================================
# Routes alerts from Prometheus to appropriate notification channels.
#
# Ref: infrastructure/monitoring/prometheus-rules.yml for alert definitions
#
# ---------------------------------------------------------------------------
# OPERATOR CONFIGURATION REQUIRED
# ---------------------------------------------------------------------------
# Before deploying to production, operators MUST provide real notification
# endpoints via environment variables or Kubernetes secrets.
#
# Required environment variables (or mount via K8s secret "alertmanager-notify"):
#
#   PAGERDUTY_SERVICE_KEY   - PagerDuty Events API v2 integration key
#                             (used for critical alerts)
#   SLACK_WEBHOOK_URL       - Slack incoming-webhook URL
#                             (used for warning-level alerts)
#   OPSGENIE_API_KEY        - OpsGenie API key (optional, for critical alerts)
#   DEFAULT_WEBHOOK_URL     - Catch-all webhook endpoint for all other alerts
#
# Example Kubernetes secret:
#
#   kubectl create secret generic alertmanager-notify \
#     --from-literal=PAGERDUTY_SERVICE_KEY='<your-key>' \
#     --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/...' \
#     --from-literal=OPSGENIE_API_KEY='<your-key>' \
#     --from-literal=DEFAULT_WEBHOOK_URL='https://your-webhook.example.com/alerts'
#
# If deploying via Helm, set the values under alertmanager.notifications
# in the validator values.yaml instead.
# ============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: '${DEFAULT_WEBHOOK_URL}'
        send_resolved: true

  - name: 'critical-receiver'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: critical
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'

  - name: 'warning-receiver'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#aethelred-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
