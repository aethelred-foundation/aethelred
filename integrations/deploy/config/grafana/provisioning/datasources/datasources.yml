# ============================================================================

apiVersion: 1

datasources:
  # --------------------------------------------------------------------------
  # Prometheus - Primary Metrics Store
  # --------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.47.0"
      cacheLevel: High
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
    uid: prometheus

  # --------------------------------------------------------------------------
  # Loki - Log Aggregation (if available)
  # --------------------------------------------------------------------------
  # Uncomment if Loki is deployed
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   orgId: 1
  #   url: http://loki:3100
  #   basicAuth: false
  #   isDefault: false
  #   version: 1
  #   editable: false
  #   jsonData:
  #     maxLines: 1000
  #   uid: loki
