{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aethelred-validator.fullname" . }}
  namespace: {{ include "aethelred-validator.namespace" . }}
  labels:
    {{- include "aethelred-validator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aethelred-validator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowIngressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 26656
        - protocol: TCP
          port: 26657
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 1317
        - protocol: TCP
          port: 26660
  egress:
    - {}
{{- end }}
