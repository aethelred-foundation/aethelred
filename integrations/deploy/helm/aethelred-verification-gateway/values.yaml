replicaCount: 2

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

application:
  runtime: fastapi # fastapi | nextjs
  image:
    repository: ghcr.io/aethelred/fastapi-verifier
    tag: latest
    pullPolicy: IfNotPresent
  command: []
  args: []
  port: 8000
  env:
    extra: []
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "1000m"
      memory: 1Gi
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

verification:
  rpcUrl: https://rpc.testnet.aethelred.io
  headerPrefix: x-aethelred
  mode: seal-envelope
  sidecar:
    enabled: false
    image:
      repository: ghcr.io/aethelred/verification-proxy
      tag: latest
      pullPolicy: IfNotPresent
    port: 9095
    resources:
      requests:
        cpu: "100m"
        memory: 128Mi
      limits:
        cpu: "500m"
        memory: 512Mi

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: verifier.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
