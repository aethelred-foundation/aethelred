name: TypeScript SDK CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test -- --run
        if: ${{ hashFiles('vitest.config.ts') != '' }}
      - run: npm pack --dry-run --loglevel=error
