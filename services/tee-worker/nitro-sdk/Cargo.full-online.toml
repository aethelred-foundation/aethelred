[package]
name = "aethelred-sdk"
version = "0.1.0"
edition = "2021"
description = "Verifiable Compute Chain (VCC) toolkit with explicit compute-backend guarantees"
license = "Apache-2.0"
repository = "https://github.com/aethelred/aethelred-sdk"
keywords = ["blockchain", "ai", "tee", "zk", "verifiable-compute"]
categories = ["cryptography", "development-tools", "wasm"]
readme = "README.md"

[lib]
name = "aethelred_sdk"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "aeth"
path = "src/bin/aeth.rs"
required-features = ["full-sdk"]

[[bin]]
name = "aeth-seal"
path = "src/bin/aeth_seal.rs"
required-features = ["full-sdk"]

[[bin]]
name = "aeth-registry"
path = "src/bin/aeth_registry.rs"
required-features = ["full-sdk"]

[dependencies]
# ============================================================================
# Post-Quantum Cryptography (NIST FIPS 204/203)
# ============================================================================
pqcrypto-dilithium = "0.5"
pqcrypto-kyber = "0.8"
pqcrypto-traits = "0.3"

# ============================================================================
# Classical Cryptography
# ============================================================================
k256 = { version = "0.13", features = ["ecdsa", "sha256"] }
p256 = { version = "0.13", features = ["ecdsa"] }
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1.5"
hmac = "0.12"
hkdf = "0.12"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"

# ============================================================================
# Zero-Knowledge Proofs
# ============================================================================
ark-ff = "0.4"
ark-ec = "0.4"
ark-bn254 = "0.4"
ark-groth16 = "0.4"
ark-snark = "0.4"
ark-serialize = "0.4"
ark-std = "0.4"

# ============================================================================
# TEE Attestation
# ============================================================================
# Intel SGX DCAP (optional - requires Intel SDK)
sgx-dcap-quoteverify = { version = "0.4", optional = true }

# AMD SEV-SNP (optional)
sev = { version = "1.2", features = ["snp"], optional = true }

# AWS Nitro (CBOR/COSE for attestation documents)
ciborium = "0.2"
coset = "0.3"

# Certificate handling
x509-cert = "0.2"
der = "0.7"
spki = "0.7"

# ============================================================================
# Serialization & Encoding
# ============================================================================
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
hex = "0.4"
base64 = "0.21"
bs58 = "0.5"

# ============================================================================
# Async Runtime
# ============================================================================
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# ============================================================================
# Networking
# ============================================================================
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
tonic = { version = "0.10", optional = true }
prost = { version = "0.12", optional = true }

# ============================================================================
# CLI & Logging
# ============================================================================
clap = { version = "4.4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
console = "0.15"
indicatif = "0.17"
dialoguer = "0.11"

# ============================================================================
# Python FFI (PyO3)
# ============================================================================
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }

# ============================================================================
# WASM (for JS/TS SDK)
# ============================================================================
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", optional = true }

# ============================================================================
# Utilities
# ============================================================================
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
once_cell = "1.19"
parking_lot = "0.12"
dashmap = "5.5"
bytes = "1.5"
zeroize = { version = "1.7", features = ["derive"] }
secrecy = "0.8"
rand = "0.8"
rand_chacha = "0.3"
tempfile = "3.9"
dirs = "5.0"
toml = "0.8"

# ============================================================================
# Merkle Trees & Data Structures
# ============================================================================
rs_merkle = "1.4"
bitvec = "1.0"

# ============================================================================
# Compression
# ============================================================================
lz4_flex = "0.11"
zstd = "0.13"

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"
proptest = "1.4"
test-case = "3.3"
mockall = "0.12"

[features]
default = ["full-sdk"]
offline-minimal = []
cli = []
python = ["pyo3"]
wasm = ["wasm-bindgen", "js-sys", "web-sys"]
grpc = ["tonic", "prost"]
intel_sgx = ["sgx-dcap-quoteverify"]
amd_sev = ["sev"]
full-sdk = ["cli", "grpc", "intel_sgx", "amd_sev"]
full = ["full-sdk"]

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = true

[profile.bench]
lto = true
codegen-units = 1

[[example]]
name = "sovereign_data"
path = "examples/sovereign_data.rs"

[[example]]
name = "zktensor_inference"
path = "examples/zktensor_inference.rs"

[[example]]
name = "trade_finance"
path = "examples/trade_finance.rs"

[[bench]]
name = "crypto_benchmarks"
harness = false
